version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "uv"
    directory: "/libs/idun_agent_engine"
    schedule:
      interval: "monthly"
  - package-ecosystem: "uv"
    directory: "/libs/idun_agent_schema"
    schedule:
      interval: "monthly"
  - package-ecosystem: "uv"
    directory: "/services/idun_agent_manager"
    schedule:
      interval: "monthly"

  - package-ecosystem: "npm"
    directory: "/services/idun_agent_web"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
