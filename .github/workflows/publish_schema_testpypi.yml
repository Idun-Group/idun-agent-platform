name: Publish idun-agent-schema to TestPyPI

on:
  push:
    branches:
      - '**'  # Trigger on all branches and all commits

jobs:
  build-and-validate:
    name: Build and validate schema package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dev_version: ${{ steps.version.outputs.dev_version }}
      artifact_name: schema-dist-${{ steps.version.outputs.dev_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Get current version and create dev version
        id: version
        working-directory: libs/idun_agent_schema
        run: |
          # Extract version from pyproject.toml
          BASE_VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          # Get branch name for display
          BRANCH_NAME="${{ github.ref_name }}"
          # Create dev version with timestamp (PyPI doesn't allow local version identifiers with +)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DEV_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
          echo "dev_version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "commit_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${DEV_VERSION}"
          echo "From branch: ${BRANCH_NAME}"
          echo "Commit: ${SHORT_SHA}"

      - name: Update version in pyproject.toml
        working-directory: libs/idun_agent_schema
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.version.outputs.dev_version }}"/' pyproject.toml
          echo "Updated pyproject.toml:"
          grep -m 1 'version = ' pyproject.toml

      - name: Build wheel and sdist (schema)
        working-directory: libs/idun_agent_schema
        run: |
          uv build --no-sources --out-dir dist

      - name: Check distribution metadata
        working-directory: libs/idun_agent_schema
        run: |
          uvx twine check dist/*

      - name: Smoke test wheel install
        working-directory: libs/idun_agent_schema
        run: |
          python -m venv /tmp/schema-wheel-venv
          source /tmp/schema-wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import idun_agent_schema; print(idun_agent_schema.__file__)"

      - name: Smoke test sdist install
        working-directory: libs/idun_agent_schema
        run: |
          python -m venv /tmp/schema-sdist-venv
          source /tmp/schema-sdist-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz
          python -c "import idun_agent_schema; print(idun_agent_schema.__file__)"

      - name: Upload schema distributions
        uses: actions/upload-artifact@v4
        with:
          name: schema-dist-${{ steps.version.outputs.dev_version }}
          path: libs/idun_agent_schema/dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish schema to TestPyPI (best effort)
    runs-on: ubuntu-latest
    needs: build-and-validate
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Download schema distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-validate.outputs.artifact_name }}
          path: dist

      - name: Publish to TestPyPI
        id: publish
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SLEEP_DURATION=30

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Publish attempt $ATTEMPT/$MAX_ATTEMPTS..."

            if uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.TEST_PYPI_API_TOKEN }} dist/*; then
              echo "success=true" >> "$GITHUB_OUTPUT"
              echo "Publish succeeded."
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Publish failed. Retrying in ${SLEEP_DURATION}s..."
              sleep $SLEEP_DURATION
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "success=false" >> "$GITHUB_OUTPUT"
          echo "Publish failed after $MAX_ATTEMPTS attempts."
          exit 1

      - name: Summarize TestPyPI publish result
        if: always()
        run: |
          echo "## Schema TestPyPI publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.publish.outputs.success }}" = "true" ]; then
            echo "Published \`${{ needs.build-and-validate.outputs.dev_version }}\` to TestPyPI." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "TestPyPI publish failed for \`${{ needs.build-and-validate.outputs.dev_version }}\`." >> "$GITHUB_STEP_SUMMARY"
            echo "Local distributions are still available as workflow artifact \`${{ needs.build-and-validate.outputs.artifact_name }}\`." >> "$GITHUB_STEP_SUMMARY"
          fi
