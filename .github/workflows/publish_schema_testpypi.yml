name: Publish idun-agent-schema to TestPyPI

on:
  push:
    branches:
      - '**'  # Trigger on all branches and all commits
  workflow_dispatch:
    inputs:
      retry_count:
        description: "Automatic retry counter (0-based)"
        required: false
        default: "0"
      source_run_id:
        description: "Original failed run id"
        required: false
        default: ""

jobs:
  prepare-retry:
    runs-on: ubuntu-latest
    outputs:
      retry_count: ${{ steps.compute.outputs.retry_count }}
      next_retry_count: ${{ steps.compute.outputs.next_retry_count }}
      allow_retry: ${{ steps.compute.outputs.allow_retry }}
    steps:
      - name: Compute retry metadata
        id: compute
        run: |
          RETRY_COUNT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.retry_count || '0' }}"
          NEXT_RETRY_COUNT=$((RETRY_COUNT + 1))
          if [ "$RETRY_COUNT" -lt 2 ]; then
            ALLOW_RETRY="true"
          else
            ALLOW_RETRY="false"
          fi
          echo "retry_count=$RETRY_COUNT" >> "$GITHUB_OUTPUT"
          echo "next_retry_count=$NEXT_RETRY_COUNT" >> "$GITHUB_OUTPUT"
          echo "allow_retry=$ALLOW_RETRY" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: prepare-retry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Get current version and create dev version
        id: version
        working-directory: libs/idun_agent_schema
        run: |
          # Extract version from pyproject.toml
          BASE_VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          # Get branch name for display
          BRANCH_NAME="${{ github.ref_name }}"
          # Create dev version with timestamp (PyPI doesn't allow local version identifiers with +)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DEV_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
          echo "dev_version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "commit_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${DEV_VERSION}"
          echo "From branch: ${BRANCH_NAME}"
          echo "Commit: ${SHORT_SHA}"

      - name: Update version in pyproject.toml
        working-directory: libs/idun_agent_schema
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.version.outputs.dev_version }}"/' pyproject.toml
          echo "Updated pyproject.toml:"
          grep -m 1 'version = ' pyproject.toml

      - name: Build wheel and sdist (schema)
        working-directory: libs/idun_agent_schema
        run: |
          uv build --no-sources

      - name: Publish to TestPyPI
        working-directory: libs/idun_agent_schema
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SLEEP_DURATION=30

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Publish attempt $ATTEMPT/$MAX_ATTEMPTS..."

            if uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.TEST_PYPI_API_TOKEN }}; then
              echo "Publish succeeded."
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Publish failed. Retrying in ${SLEEP_DURATION}s..."
              sleep $SLEEP_DURATION
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Publish failed after $MAX_ATTEMPTS attempts."
          exit 1

  retry-workflow:
    if: ${{ needs.build-and-publish.result == 'failure' && needs.prepare-retry.outputs.allow_retry == 'true' }}
    needs: [prepare-retry, build-and-publish]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch retry run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish_schema_testpypi.yml',
              ref: context.ref.replace('refs/heads/', ''),
              inputs: {
                retry_count: '${{ needs.prepare-retry.outputs.next_retry_count }}',
                source_run_id: String(context.runId),
              },
            });
