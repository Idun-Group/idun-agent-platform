name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint, type-check, and secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Run pre-commit via uv
        env:
          RUFF_CACHE_DIR: ${{ github.workspace }}/.ruff_cache
          PYRIGHT_PYTHON_FORCE_VERSION: latest
        run: |
          uv run pre-commit run --all-files

  test-engine:
    name: Test engine and manager (Py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Install workspace dependencies
        run: |
          uv sync --group dev

      - name: Run engine tests
        env:
          GUARDRAILS_API_KEY: ${{ secrets.GUARDRAILS_API_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
        run: |
          uv run pytest libs/idun_agent_engine/tests

      - name: Run manager tests
        run: |
          uv run pytest services/idun_agent_manager/tests

  docker-build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [lint, test-engine]
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    environment:
      name: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Authenticate to Google Cloud (Workload Identity Federation)'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_ID_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: 'Configure Docker to use gcloud as a credential helper'
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Generate image tag
        id: tag
        run: echo "ts=dev-$(date -u +%Y%m%dT%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and Push idun-platform (agent manager)
        run: |
          BASE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/idun-platform-repo/idun-platform"
          docker build --platform linux/amd64 -t "$BASE:${{ steps.tag.outputs.ts }}" -t "$BASE:latest" services/idun_agent_manager
          docker push "$BASE:${{ steps.tag.outputs.ts }}"
          docker push "$BASE:latest"

      - name: Build and Push idun-web (agent web)
        run: |
          BASE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/idun-web-repo/idun-web"
          docker build --platform linux/amd64 -t "$BASE:${{ steps.tag.outputs.ts }}" -t "$BASE:latest" services/idun_agent_web
          docker push "$BASE:${{ steps.tag.outputs.ts }}"
          docker push "$BASE:latest"

      - name: Build and Push copilotkit (copilot runtime)
        run: |
          BASE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/copilotkit-repo/copilotkit"
          docker build --platform linux/amd64 -t "$BASE:${{ steps.tag.outputs.ts }}" -t "$BASE:latest" services/copilot_runtime
          docker push "$BASE:${{ steps.tag.outputs.ts }}"
          docker push "$BASE:latest"
