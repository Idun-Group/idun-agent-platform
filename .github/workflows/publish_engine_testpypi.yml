name: Publish idun-agent-engine to TestPyPI

on:
  push:
    branches:
      - '**'  # Trigger on all branches and all commits

jobs:
  build-and-validate:
    name: Build and validate engine package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      engine_dev_version: ${{ steps.versions.outputs.engine_dev_version }}
      schema_dev_version: ${{ steps.versions.outputs.schema_dev_version }}
      artifact_name: engine-validation-bundle-${{ steps.versions.outputs.engine_dev_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Get current versions and create dev versions
        id: versions
        run: |
          ENGINE_BASE_VERSION=$(grep -m 1 'version = ' libs/idun_agent_engine/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          SCHEMA_BASE_VERSION=$(grep -m 1 'version = ' libs/idun_agent_schema/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          BRANCH_NAME="${{ github.ref_name }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          ENGINE_DEV_VERSION="${ENGINE_BASE_VERSION}.dev${TIMESTAMP}"
          SCHEMA_DEV_VERSION="${SCHEMA_BASE_VERSION}.dev${TIMESTAMP}"

          echo "engine_dev_version=${ENGINE_DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "schema_dev_version=${SCHEMA_DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "commit_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Local schema version: ${SCHEMA_DEV_VERSION}"
          echo "Engine version: ${ENGINE_DEV_VERSION}"
          echo "From branch: ${BRANCH_NAME}"
          echo "Commit: ${SHORT_SHA}"

      - name: Update schema version in pyproject.toml
        working-directory: libs/idun_agent_schema
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.versions.outputs.schema_dev_version }}"/' pyproject.toml
          echo "Updated schema pyproject.toml:"
          grep -m 1 'version = ' pyproject.toml

      - name: Build wheel and sdist (schema)
        working-directory: libs/idun_agent_schema
        run: |
          uv build --no-sources --out-dir dist

      - name: Update engine version and local schema dependency
        working-directory: libs/idun_agent_engine
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.versions.outputs.engine_dev_version }}"/' pyproject.toml

          echo "Updating schema dependency to local version: ${{ steps.versions.outputs.schema_dev_version }}"
          sed -i 's|"idun-agent-schema>=.*"|"idun-agent-schema==${{ steps.versions.outputs.schema_dev_version }}"|' pyproject.toml

          echo "Updated pyproject.toml:"
          grep -m 1 'version = ' pyproject.toml
          grep 'idun-agent-schema' pyproject.toml

      - name: Build wheel and sdist (engine)
        working-directory: libs/idun_agent_engine
        run: |
          uv build --no-sources --out-dir dist

      - name: Check distribution metadata
        run: |
          uvx twine check libs/idun_agent_schema/dist/* libs/idun_agent_engine/dist/*

      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/engine-wheel-venv
          source /tmp/engine-wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install libs/idun_agent_schema/dist/*.whl
          python -m pip install libs/idun_agent_engine/dist/*.whl
          python -c "import idun_agent_engine; import idun_platform_cli; print(idun_agent_engine.__file__)"

      - name: Smoke test sdist install
        run: |
          python -m venv /tmp/engine-sdist-venv
          source /tmp/engine-sdist-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install libs/idun_agent_schema/dist/*.tar.gz
          python -m pip install libs/idun_agent_engine/dist/*.tar.gz
          python -c "import idun_agent_engine; import idun_platform_cli; print(idun_agent_engine.__file__)"

      - name: Upload validation artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: engine-validation-bundle-${{ steps.versions.outputs.engine_dev_version }}
          path: |
            libs/idun_agent_schema/dist/*
            libs/idun_agent_engine/dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish engine to TestPyPI (best effort)
    runs-on: ubuntu-latest
    needs: build-and-validate
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Get latest schema test version from TestPyPI
        id: schema_version
        run: |
          SCHEMA_BASE_VERSION=$(grep -m 1 'version = ' libs/idun_agent_schema/pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          echo "Waiting for latest schema version to be available on TestPyPI..."
          MAX_ATTEMPTS=24
          ATTEMPT=1
          SLEEP_DURATION=5

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Looking for latest schema dev version..."

            LATEST_DEV=$(pip index versions idun-agent-schema --index-url https://test.pypi.org/simple/ --pre 2>/dev/null | grep "Available versions:" -A 50 | grep -o "${SCHEMA_BASE_VERSION}\.dev[0-9]*" | head -1 || echo "")

            if [ -n "$LATEST_DEV" ]; then
              echo "✓ Found schema version on TestPyPI: ${LATEST_DEV}"
              echo "schema_dev_version=${LATEST_DEV}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Package not yet available. Waiting ${SLEEP_DURATION}s..."
            sleep $SLEEP_DURATION
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "❌ Could not find schema version on TestPyPI after waiting"
          exit 1

      - name: Update engine version and TestPyPI schema dependency
        working-directory: libs/idun_agent_engine
        run: |
          sed -i 's/version = ".*"/version = "${{ needs.build-and-validate.outputs.engine_dev_version }}"/' pyproject.toml
          sed -i 's|"idun-agent-schema>=.*"|"idun-agent-schema==${{ steps.schema_version.outputs.schema_dev_version }}"|' pyproject.toml

          echo "Updated publish pyproject.toml:"
          grep -m 1 'version = ' pyproject.toml
          grep 'idun-agent-schema' pyproject.toml

      - name: Build publishable engine distributions
        working-directory: libs/idun_agent_engine
        run: |
          echo "Building engine with schema from TestPyPI..."
          UV_INDEX_URL=https://test.pypi.org/simple/ UV_EXTRA_INDEX_URL=https://pypi.org/simple/ uv build --no-sources --out-dir dist

      - name: Publish to TestPyPI
        id: publish
        working-directory: libs/idun_agent_engine
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SLEEP_DURATION=30

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Publish attempt $ATTEMPT/$MAX_ATTEMPTS..."

            if uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.TEST_PYPI_API_TOKEN }} dist/*; then
              echo "success=true" >> "$GITHUB_OUTPUT"
              echo "Publish succeeded."
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Publish failed. Retrying in ${SLEEP_DURATION}s..."
              sleep $SLEEP_DURATION
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "success=false" >> "$GITHUB_OUTPUT"
          echo "Publish failed after $MAX_ATTEMPTS attempts."
          exit 1

      - name: Summarize TestPyPI publish result
        if: always()
        run: |
          echo "## Engine TestPyPI publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.publish.outputs.success }}" = "true" ]; then
            echo "Published \`${{ needs.build-and-validate.outputs.engine_dev_version }}\` to TestPyPI." >> "$GITHUB_STEP_SUMMARY"
            echo "Published package depends on schema \`${{ steps.schema_version.outputs.schema_dev_version }}\` from TestPyPI." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "TestPyPI publish failed for \`${{ needs.build-and-validate.outputs.engine_dev_version }}\`." >> "$GITHUB_STEP_SUMMARY"
            echo "Local schema and engine distributions are still available as workflow artifact \`${{ needs.build-and-validate.outputs.artifact_name }}\`." >> "$GITHUB_STEP_SUMMARY"
          fi
