name: Smoke test — production Docker Compose

on:
  push:
    branches: [main, develop]
    paths:
      - "docker-compose.yml"
      - "docker-compose.build.yml"
      - "services/idun_agent_manager/Dockerfile"
      - "services/idun_agent_web/Dockerfile"
      - "services/idun_agent_web/nginx.conf"
      - "services/idun_agent_web/docker-entrypoint.sh"
      - ".github/workflows/smoke-test-compose.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "docker-compose.yml"
      - "docker-compose.build.yml"
      - "services/idun_agent_manager/Dockerfile"
      - "services/idun_agent_web/Dockerfile"
      - "services/idun_agent_web/nginx.conf"
      - "services/idun_agent_web/docker-entrypoint.sh"
      - ".github/workflows/smoke-test-compose.yml"

jobs:
  validate-compose:
    name: Validate compose file syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.build.yml
        run: docker compose -f docker-compose.build.yml config --quiet

  smoke-test:
    name: Smoke test (build from source)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build manager and web images
        # Build the production Dockerfiles and tag them to match the image
        # names expected by docker-compose.yml. This lets the smoke test run
        # the exact same compose configuration that end-users would use, without
        # requiring the published Docker Hub images to exist yet.
        run: |
          docker build \
            -f services/idun_agent_manager/Dockerfile \
            -t freezaa9/idun-ai:0.5.1 \
            services/idun_agent_manager
          docker build \
            -f services/idun_agent_web/Dockerfile \
            -t freezaa9/idun-ai-web:0.5.1 \
            services/idun_agent_web

      - name: Start stack (db + manager + web)
        # Skip the agent service — it builds from an examples directory and
        # is tested separately. Only the infrastructure services are needed.
        run: |
          docker compose up -d db manager web

      - name: Wait for manager to be healthy
        run: |
          echo "Waiting for manager healthcheck..."
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' idun-manager 2>/dev/null || echo "starting")
            echo "  attempt $i/20: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Manager is healthy."
              break
            fi
            if [ "$i" = "20" ]; then
              echo "Manager did not become healthy in time."
              docker compose logs manager
              exit 1
            fi
            sleep 10
          done

      - name: Verify manager health endpoint
        run: |
          curl -fsS http://localhost:8000/api/v1/healthz \
            -H "Accept: application/json" \
            | grep -q '"status"'

      - name: Verify web UI is reachable
        run: |
          curl -fsS --max-time 10 http://localhost:3000/ \
            | grep -q '<html'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
